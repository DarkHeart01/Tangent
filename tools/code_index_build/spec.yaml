name: code_index_build
description: "Rebuild (incrementally) the local semantic code index used by code_search. Safe to call repeatedly — unchanged files are skipped by content hash, so repeat calls on a mostly-unchanged repo are cheap."
version: "1.0.0"
side_effect_level: mutates-local
permissions: []
input_schema:
  type: object
  properties:
    force:
      type: boolean
      description: "Re-embed every file even if unchanged (default false)."
  required: []
  additionalProperties: false
output_schema:
  type: object
timeout: 300.0
