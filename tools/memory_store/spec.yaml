name: memory_store
description: "Write a key-value pair to long-term memory for later retrieval via memory_retrieve."
version: "1.0.0"
side_effect_level: mutates-local
permissions: []
input_schema:
  type: object
  properties:
    key:
      type: string
      description: "Memory key to store under (e.g. a semantic key from schemas/memory_keys.yaml)"
    value:
      type: string
      description: "Content to store — often a JSON string per the calling agent's handoff contract"
  required: [key, value]
  additionalProperties: false
output_schema:
  type: object
  properties:
    stored:
      type: boolean
    key:
      type: string
timeout: 10.0
retry:
  max_attempts: 2
